services:
  # OpenClaw Gateway — upstream engine, untouched
  gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    init: true
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    environment:
      - NODE_HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_TZ=${TZ:-America/Sao_Paulo}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - CLAUDE_AI_SESSION_KEY=${CLAUDE_AI_SESSION_KEY:-}
      - CLAUDE_WEB_SESSION_KEY=${CLAUDE_WEB_SESSION_KEY:-}
      - CLAUDE_WEB_COOKIE=${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ./data/openclaw-config:/home/node/.openclaw
      - ./data/workspaces:/home/node/workspaces
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Knowspace portal — our product layer
  knowspace:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "${KNOWSPACE_PORT:-3445}:3445"
    environment:
      - HOME=/home/node
      - KNOWSPACE_GATEWAY_URL=ws://gateway:18789
      - KNOWSPACE_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - KNOWSPACE_PORT=3445
      - KNOWSPACE_BASE_URL=${KNOWSPACE_BASE_URL:-http://localhost:3445}
      - KNOWSPACE_ADMIN_SLUG=${KNOWSPACE_ADMIN_SLUG:-main}
      - KNOWSPACE_TOKENS_FILE=/app/data/.tokens.json
    volumes:
      - ./data/workspaces:/home/node/workspaces
      - ./data/knowspace:/home/node/.knowspace
      - ./data/appdata:/app/data
    depends_on:
      gateway:
        condition: service_healthy
